<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Smart Discovery - Test Suite</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #f8fafc;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            color: #ff4757;
        }
        .summary-box {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .stat span {
            font-size: 1.5rem;
            margin-left: 0.25rem;
        }
        .pass-color { color: #2ed573; }
        .fail-color { color: #ff4757; }
        .test-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .test-card {
            background-color: rgba(30, 41, 59, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .test-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .test-title {
            font-weight: 600;
            font-size: 1rem;
        }
        .test-desc {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .test-status {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
        }
        .status-pass {
            background-color: rgba(46, 213, 115, 0.15);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.3);
        }
        .status-fail {
            background-color: rgba(255, 71, 87, 0.15);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }
        .assertion-details {
            margin-top: 0.5rem;
            font-family: monospace;
            font-size: 0.75rem;
            color: #cbd5e1;
            background: #090d16;
            padding: 0.5rem;
            border-radius: 4px;
            white-space: pre-wrap;
            display: none;
            width: 100%;
        }
        .expanded .assertion-details {
            display: block;
        }
        .btn-toggle {
            background: transparent;
            border: 1px solid #64748b;
            color: #94a3b8;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 0.25rem;
            align-self: flex-start;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #38bdf8;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Back to Assistant App</a>
    <h1>Algorithm & Recommendation Engine Diagnostic Test Suite</h1>

    <div class="summary-box">
        <div class="stat">Total Tests: <span id="total-count">0</span></div>
        <div class="stat">Passed: <span id="pass-count" class="pass-color">0</span></div>
        <div class="stat">Failed: <span id="fail-count" class="fail-color">0</span></div>
    </div>

    <div class="test-list" id="test-list-container">
        <!-- Tests will render here -->
    </div>

    <!-- Include the mock databases and calculation helper from app.js indirectly or recreate calculations for isolated testing -->
    <script>
        // We replicate state and calculation logic in sandbox to verify correctness of algorithms in isolation
        
        // Mock Catalog
        const catalog = [
            { id: 'sofa_exact', category: 'Sofa', style: 'Cozy Modern', tags: ['sofa', 'linen', 'beige'], colors: ['#e6dfd3'], price: 1399 },
            { id: 'sofa_cheap', category: 'Sofa', style: 'Cozy Modern', tags: ['sofa', 'beige', 'fabric'], colors: ['#e6dfd3'], price: 549 },
            { id: 'sofa_premium', category: 'Sofa', style: 'Minimalist', tags: ['sofa', 'boucle', 'premium'], colors: ['#ffffff'], price: 2899 },
            { id: 'blazer_exact', category: 'Blazer', style: 'Minimalist', tags: ['blazer', 'linen', 'beige'], colors: ['#dfd6c8'], price: 148 }
        ];

        // Similarity score function identical to production
        function testCalculateSimilarity(product, searchTarget, activeBoard, feedback = null) {
            let score = 0;
            
            // 1. Category Match
            if (product.category.toLowerCase() === searchTarget.category.toLowerCase()) {
                score += 45;
            }

            // 2. Style Match
            if (product.style.toLowerCase() === searchTarget.style.toLowerCase()) {
                score += 20;
            }

            // 3. Tag Overlap (Jaccard similarity)
            if (searchTarget.tags && searchTarget.tags.length > 0) {
                const prodTags = product.tags;
                const intersection = prodTags.filter(t => searchTarget.tags.includes(t));
                const union = [...new Set([...prodTags, ...searchTarget.tags])];
                const jaccard = intersection.length / union.length;
                score += Math.round(jaccard * 20);
            }

            // 4. Color Proximity
            if (searchTarget.color && product.colors.includes(searchTarget.color)) {
                score += 15;
            }

            // 5. Personalization boost
            if (activeBoard) {
                if (activeBoard.styleFocus.toLowerCase() === product.style.toLowerCase()) {
                    score += 10;
                }
                if (activeBoard.categoryFocus.toLowerCase() === 'fashion' && ['Blazer', 'T-Shirt', 'Jeans', 'Shoes', 'Cardigan', 'Dress'].includes(product.category)) {
                    score += 5;
                }
                if (activeBoard.categoryFocus.toLowerCase() === 'home decor' && ['Sofa', 'Lamp', 'Rug', 'Table', 'Desk', 'Chair', 'Plant'].includes(product.category)) {
                    score += 5;
                }
            }

            // 6. Feedback
            if (feedback === 'up') {
                score += 10;
            } else if (feedback === 'down') {
                score -= 25;
            }

            return Math.min(100, Math.max(0, score));
        }

        const tests = [
            {
                name: "Category Match Dominance",
                description: "Verifies that matching product category dominates the similarity scoring.",
                run: () => {
                    const searchTarget = { category: 'Sofa', style: 'Cozy Modern', tags: ['sofa', 'linen'], color: '#e6dfd3' };
                    const matchingSofa = catalog.find(p => p.id === 'sofa_exact');
                    const nonMatchingBlazer = catalog.find(p => p.id === 'blazer_exact');
                    
                    const sofaScore = testCalculateSimilarity(matchingSofa, searchTarget, null);
                    const blazerScore = testCalculateSimilarity(nonMatchingBlazer, searchTarget, null);
                    
                    const assertion = `Sofa Score: ${sofaScore} (expected > 60)\nBlazer Score: ${blazerScore} (expected < 40)`;
                    const passed = (sofaScore > 60) && (blazerScore < 40);
                    
                    return { passed, details: assertion };
                }
            },
            {
                name: "Style Match Boost",
                description: "Verifies style-match contributes positive score weights correctly.",
                run: () => {
                    const targetStyleCozy = { category: 'Sofa', style: 'Cozy Modern', tags: [], color: null };
                    const targetStyleMin = { category: 'Sofa', style: 'Minimalist', tags: [], color: null };
                    const cozySofa = catalog.find(p => p.id === 'sofa_exact'); // Cozy Modern Sofa
                    
                    const scoreSameStyle = testCalculateSimilarity(cozySofa, targetStyleCozy, null);
                    const scoreDiffStyle = testCalculateSimilarity(cozySofa, targetStyleMin, null);
                    
                    const difference = scoreSameStyle - scoreDiffStyle;
                    const assertion = `Same Style Score: ${scoreSameStyle}\nDifferent Style Score: ${scoreDiffStyle}\nDifference: +${difference} points (expected exactly +20)`;
                    const passed = (difference === 20);
                    
                    return { passed, details: assertion };
                }
            },
            {
                name: "Price Classification",
                description: "Verifies logic separating matching items into Cheaper vs. Premium categories.",
                run: () => {
                    const exactPrice = 1399; // sofa_exact
                    const cheapPrice = 549; // sofa_cheap
                    const premiumPrice = 2899; // sofa_premium
                    
                    const isCheapCorrect = (cheapPrice < exactPrice);
                    const isPremiumCorrect = (premiumPrice > exactPrice);
                    
                    const assertion = `Exact price: $${exactPrice}\nCheap price: $${cheapPrice} (cheaper: ${isCheapCorrect})\nPremium price: $${premiumPrice} (premium: ${isPremiumCorrect})`;
                    const passed = isCheapCorrect && isPremiumCorrect;
                    
                    return { passed, details: assertion };
                }
            },
            {
                name: "Personalization Board Booster",
                description: "Verifies style & category boosts are added based on the active board profile.",
                run: () => {
                    const searchTarget = { category: 'Sofa', style: 'Cozy Modern', tags: [], color: null };
                    const cozySofa = catalog.find(p => p.id === 'sofa_exact');
                    
                    // Board 1: Matches Cozy Modern Home Decor
                    const decorBoard = { id: 'board_decor', name: 'Home Decor', styleFocus: 'Cozy Modern', categoryFocus: 'Home Decor' };
                    // Board 2: Matches Minimalist Outfits (different style, different vertical)
                    const outfitsBoard = { id: 'board_outfits', name: 'Outfits', styleFocus: 'Minimalist', categoryFocus: 'Fashion' };
                    
                    const scoreWithDecorBoard = testCalculateSimilarity(cozySofa, searchTarget, decorBoard);
                    const scoreWithOutfitsBoard = testCalculateSimilarity(cozySofa, searchTarget, outfitsBoard);
                    
                    const difference = scoreWithDecorBoard - scoreWithOutfitsBoard;
                    const assertion = `Score with Matching Board: ${scoreWithDecorBoard}\nScore with Non-matching Board: ${scoreWithOutfitsBoard}\nDifference: +${difference} (expected exactly +15 boost: +10 style Focus +5 category Focus)`;
                    const passed = (difference === 15);
                    
                    return { passed, details: assertion };
                }
            },
            {
                name: "Feedback Loop Influence",
                description: "Verifies up/down relevance buttons adjust recommendation weights appropriately.",
                run: () => {
                    const searchTarget = { category: 'Sofa', style: 'Cozy Modern', tags: [], color: null };
                    const sofa = catalog.find(p => p.id === 'sofa_exact');
                    
                    const baselineScore = testCalculateSimilarity(sofa, searchTarget, null);
                    const scoreUpvoted = testCalculateSimilarity(sofa, searchTarget, null, 'up');
                    const scoreDownvoted = testCalculateSimilarity(sofa, searchTarget, null, 'down');
                    
                    const upDiff = scoreUpvoted - baselineScore;
                    const downDiff = scoreDownvoted - baselineScore;
                    
                    const assertion = `Baseline: ${baselineScore}\nUpvoted: ${scoreUpvoted} (Diff: +${upDiff})\nDownvoted: ${scoreDownvoted} (Diff: ${downDiff})`;
                    const passed = (upDiff === 10) && (downDiff === -25);
                    
                    return { passed, details: assertion };
                }
            }
        ];

        // Execute tests
        let passCount = 0;
        let failCount = 0;
        const container = document.getElementById('test-list-container');

        tests.forEach((test, idx) => {
            const result = test.run();
            const card = document.createElement('div');
            card.className = 'test-card';
            
            if (result.passed) {
                passCount++;
            } else {
                failCount++;
            }

            const statusClass = result.passed ? 'status-pass' : 'status-fail';
            const statusLabel = result.passed ? 'PASSED' : 'FAILED';

            card.innerHTML = `
                <div class="test-info" style="width: 100%;">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <div>
                            <span class="test-title">${test.name}</span>
                            <span class="test-desc" style="display: block; margin-top: 0.15rem;">${test.description}</span>
                        </div>
                        <span class="test-status ${statusClass}">${statusLabel}</span>
                    </div>
                    <button class="btn-toggle" onclick="toggleDetails(this)">Show Assertions</button>
                    <div class="assertion-details">${result.details}</div>
                </div>
            `;
            
            container.appendChild(card);
        });

        // Update counts
        document.getElementById('total-count').innerText = tests.length;
        document.getElementById('pass-count').innerText = passCount;
        document.getElementById('fail-count').innerText = failCount;

        function toggleDetails(btn) {
            const parent = btn.parentElement;
            parent.classList.toggle('expanded');
            btn.innerText = parent.classList.contains('expanded') ? 'Hide Assertions' : 'Show Assertions';
        }
    </script>
</body>
</html>
